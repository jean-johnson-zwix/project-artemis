<rect x="52" y="1732" width="950" height="196" fill="#FFFEF5" stroke="#CC9922" stroke-width="0.8" rx="3"/><text x="60" y="1752" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1A2B4A" text-anchor="start" font-weight="bold">NOTES &amp; DESIGN BASIS</text><text x="60" y="1768" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">1.  V-101 MAWP: 75 barg @ 120°C. ASME VIII Div 1. Corrosion allowance: 3.0mm remaining (AT2020 data).</text><text x="60" y="1784" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">2.  All instrument nozzle connections ½" 3000# NPT SW unless stated otherwise on drawing.</text><text x="60" y="1800" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">3.  SDV-101 and SDV-201 are fail-safe CLOSED on loss of instrument air (&gt;6 barg required).</text><text x="60" y="1816" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">4.  LCV-101: Fisher V250 rotary ball, 4" ANSI 300#, A/O F/C. PCV-101: Fisher 657, 3" ANSI 900#, A/O F/O.</text><text x="60" y="1832" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">5.  ESD logic per NPA-ESD-CEF-001 Rev 12. PSHH-101: 72 barg → trips SDV-101, SDV-201, opens BDV-101.</text><text x="60" y="1848" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">6.  LSHH-101: 80% level → opens LCV-101 to 100%, alarm to DCS. LSLL-101: 8% → trips P-101A/B.</text><text x="60" y="1864" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">7.  P-101A is duty pump, P-101B is standby. Auto start of P-101B on loss of P-101A discharge pressure.</text><text x="60" y="1880" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">8.  For LP Compression Train see NPA-PID-005. Water Treatment: NPA-PID-009. Export: NPA-PID-012.</text><text x="60" y="1896" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">9.  P-101A/B bearing lubrication: Shell Gadus S2 V220-2, every 2000 hrs (14 days). See MNT-CHK-P101.</text><text x="60" y="1912" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#2A2A2A" text-anchor="start">10. E-101 approach temperature alarm at +8°C deviation from design curve. See SOP-MAINT-010.</text><rect x="1052" y="1732" width="480" height="185" fill="#F5F8FC" stroke="#1B4F8A" stroke-width="0.8" rx="3"/><text x="1290" y="1752" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle" font-weight="bold">LEGEND — ISA 5.1 SYMBOLS</text><line x1="1060" y1="1772" x2="1120" y2="1772" stroke="#1A1A2E" stroke-width="3"/><path d="M 1094,1765.95 L 1116,1772 L 1094,1778.05 Z" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="1"/><text x="1102" y="1772" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="start">Process pipeline (flow direction shown)</text><polyline points="1060,1800 1120,1800" fill="none" stroke="#1B4F8A" stroke-width="1.5" stroke-dasharray="6,3"/><text x="1102" y="1800" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="start">Instrument signal line (electronic)</text><circle cx="1074" cy="1827" r="13" fill="#F7FBFF" stroke="#1B4F8A" stroke-width="1.5"/><text x="1074" y="1831" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#1A1A2E" text-anchor="middle" font-weight="bold">PT</text><text x="1102" y="1828" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1A1A2E" text-anchor="start">Field-mounted instrument (transmitter)</text><circle cx="1074" cy="1855" r="13" fill="#F7FBFF" stroke="#1B4F8A" stroke-width="1.5"/><line x1="1061" y1="1855" x2="1087" y2="1855" stroke="#1B4F8A" stroke-width="1.2"/><text x="1074" y="1859" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#1A1A2E" text-anchor="middle
